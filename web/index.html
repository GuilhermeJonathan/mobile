<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <title>Meu FinDog · seu assistente financeiro</title>

    <!-- SEO -->
    <meta name="description" content="Controle suas finanças com o Meu FinDog — lançamentos, metas, orçamento e muito mais." />
    <meta name="author" content="Meu FinDog" />

    <!-- Open Graph (WhatsApp, Telegram, Facebook, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://app.findog.com.br/" />
    <meta property="og:title"       content="Meu FinDog · seu assistente financeiro" />
    <meta property="og:description" content="Controle suas finanças com inteligência. Lançamentos, metas, orçamento e integração com WhatsApp." />
    <meta property="og:image"       content="https://app.findog.com.br/og-image.svg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="pt_BR" />
    <meta property="og:site_name"   content="Meu FinDog" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Meu FinDog · seu assistente financeiro" />
    <meta name="twitter:description" content="Controle suas finanças com inteligência. Lançamentos, metas, orçamento e integração com WhatsApp." />
    <meta name="twitter:image"       content="https://app.findog.com.br/og-image.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />

    <!-- PWA / mobile app-like experience -->
    <!-- Cor do chrome do browser = fundo escuro do app (barra acoplada visualmente) -->
    <meta name="theme-color" content="#0d1117" />

    <!-- iOS: modo standalone (sem chrome do Safari ao instalar no home screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Meu FinDog" />
    <!-- black-translucent: status bar fica transparente sobre o conteúdo no iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Android: oculta barra de endereço ao rolar (reforça modo app) -->
    <meta name="mobile-web-app-capable" content="yes" />

    <style>
      /* Garante que o app preenche até embaixo do indicador home (iOS/Android) */
      html, body, #root {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>

    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>
  <body>
    <noscript>Você precisa habilitar o JavaScript para usar este app.</noscript>
    <div id="root"></div>
  </body>
</html>
