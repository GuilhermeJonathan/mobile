<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
    <radialGradient id="headGrad" cx="45%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#f5b84a"/>
      <stop offset="100%" stop-color="#d4892a"/>
    </radialGradient>
    <radialGradient id="earGrad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#c8762a"/>
      <stop offset="100%" stop-color="#a05818"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" ry="224" fill="none" stroke="#3fb95020" stroke-width="2"/>

  <!-- Left ear -->
  <ellipse cx="285" cy="420" rx="95" ry="172"
    fill="url(#earGrad)"
    transform="rotate(-18 285 420)"
    filter="url(#shadow)"/>

  <!-- Right ear -->
  <ellipse cx="739" cy="420" rx="95" ry="172"
    fill="url(#earGrad)"
    transform="rotate(18 739 420)"
    filter="url(#shadow)"/>

  <!-- Head -->
  <circle cx="512" cy="472" r="268" fill="url(#headGrad)" filter="url(#shadow)"/>

  <!-- Snout -->
  <ellipse cx="512" cy="598" rx="140" ry="106" fill="#f8d898"/>

  <!-- Left eye — white -->
  <circle cx="394" cy="440" r="58" fill="white"/>
  <!-- Left eye — dark -->
  <circle cx="404" cy="452" r="40" fill="#0d0818"/>
  <!-- Left eye — shine -->
  <circle cx="420" cy="436" r="14" fill="white"/>

  <!-- Right eye — white -->
  <circle cx="630" cy="440" r="58" fill="white"/>
  <!-- Right eye — dark -->
  <circle cx="620" cy="452" r="40" fill="#0d0818"/>
  <!-- Right eye — shine -->
  <circle cx="636" cy="436" r="14" fill="white"/>

  <!-- Nose -->
  <ellipse cx="512" cy="562" rx="46" ry="33" fill="#1a0800"/>
  <ellipse cx="526" cy="552" rx="14" ry="10" fill="rgba(255,255,255,0.3)" transform="rotate(-20 526 552)"/>

  <!-- Smile -->
  <path d="M 462 608 Q 512 660 562 608"
    stroke="#1a0800" stroke-width="10" fill="none"
    stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="328" cy="565" rx="54" ry="36" fill="rgba(255,110,80,0.22)"/>
  <ellipse cx="696" cy="565" rx="54" ry="36" fill="rgba(255,110,80,0.22)"/>

  <!-- Collar -->
  <rect x="300" y="700" width="424" height="58" rx="29"
    fill="#3fb950" filter="url(#glow)"/>
  <!-- Collar shine -->
  <rect x="300" y="700" width="424" height="20" rx="29"
    fill="rgba(255,255,255,0.18)"/>

  <!-- R$ tag -->
  <circle cx="512" cy="792" r="54" fill="#e8a840" stroke="#3fb950" stroke-width="6"/>
  <text x="512" y="806"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="40" font-weight="900"
    text-anchor="middle" fill="#0d1117">R$</text>
</svg>
