<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Fundo gradiente escuro -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <!-- Verde brilhante para o símbolo -->
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56d364"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <!-- Brilho suave -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Borda sutil -->
  <rect width="1024" height="1024" rx="224" ry="224"
        fill="none" stroke="#3fb95033" stroke-width="3"/>

  <!-- Linha decorativa superior (gráfico simplificado) -->
  <polyline
    points="160,480  260,360  380,420  500,300  620,370  740,260  864,320"
    fill="none" stroke="#3fb95044" stroke-width="18"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "M" estilizado + símbolo R$ combinados -->
  <!-- Letra M grande centralizada -->
  <text
    x="512" y="620"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="420"
    font-weight="800"
    text-anchor="middle"
    fill="url(#green)"
    filter="url(#glow)"
    letter-spacing="-20">M</text>

  <!-- Cifrão pequeno sobreposto no canto superior direito do M -->
  <circle cx="730" cy="310" r="88" fill="#0d1117" stroke="#3fb950" stroke-width="6"/>
  <text
    x="730" y="350"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="900"
    text-anchor="middle"
    fill="#3fb950">R$</text>

  <!-- Linha horizontal fina separadora embaixo -->
  <rect x="180" y="680" width="664" height="6" rx="3" fill="#3fb95033"/>

  <!-- Subtítulo mínimo -->
  <text
    x="512" y="760"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="300"
    text-anchor="middle"
    fill="#ffffff44"
    letter-spacing="18">FINANCEIRO</text>
</svg>
